<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TouriCNの主页</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
/* ===== 基础 ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Ma Shan Zheng', cursive;
  color:#fff;
  min-height:100vh;
  background: #1a1a2e;
  overflow-x:hidden;
}
/* ===== 背景 ===== */
.bg {
  position:fixed; inset:0;
  background:url('https://site-file.shenyouchu.cn/pc.jpg') center/cover no-repeat;
  filter:brightness(.5);
  z-index:-1;
}
/* ===== 主体 ===== */
.main {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
/* ===== 头像 ===== */
.avatar-wrap { text-align:center; margin-bottom:30px; }
.avatar {
  width:120px; height:120px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-15px); }
}
/* ===== 头像下方文字 ===== */
.avatar-text { margin-top:15px; }
.avatar-text h1 { font-size:28px; margin-bottom:5px; }
.avatar-text p { font-size:14px; opacity:0.8; }

/* ===== 菜单区域 ===== */
.menu-container {
  margin-top: 30px;
}

/* ===== 分类标题 ===== */
.category-title {
  font-size: 22px;
  margin-top: 25px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  color: #FFB7C5;
}

/* ===== 菜单项 ===== */
.menu-item {
  padding: 12px 15px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid transparent;
}
.menu-item:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
}
.menu-item.active {
  background: rgba(255,183,197,0.2);
  border-color: #FFB7C5;
}

/* ===== 文档内容区域（直接在菜单下方） ===== */
.doc-content {
  margin-top: 15px;
  padding: 20px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  display: none; /* 默认隐藏 */
}
.doc-content.show {
  display: block;
}
.doc-content h2 {
  color: #FFB7C5;
  margin-bottom: 15px;
  font-size: 20px;
}
.doc-content-body {
  line-height: 1.8;
  color: rgba(255,255,255,0.85);
}
.doc-content-body strong {
  color: #fff;
}

/* ===== 链接卡片 ===== */
.links {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:15px;
  margin-top: 15px;
}
.card {
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  text-decoration:none;
  color:#fff;
  border:1px solid rgba(255,255,255,.15);
  transition:.3s;
}
.card:hover {
  transform:scale(1.05);
  background:rgba(255,255,255,.2);
}
.card img {
  width:48px; height:48px;
  border-radius:50%;
  margin-right:15px;
}
.card h3 { font-size:18px; margin-bottom:4px; }
.card p { font-size:14px; opacity:.8; }

/* ===== 底部信息 ===== */
.footer-info {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.runtime {
  text-align:center;
  font-size:14px;
}
.runtime span {
  color:#FFB7C5;
  font-weight:bold;
}
.footer {
  text-align:center;
  font-size:14px;
  opacity:.8;
  line-height:1.8;
  margin-top:15px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <!-- 头像 -->
  <div class="avatar-wrap">
    <img class="avatar" src="/favicon.png">
    <div class="avatar-text">
      <h1>TouriCNの站点</h1>
      <p>你现在在主页<br>分享一些有趣的东西</p>
    </div>
  </div>

  <!-- 菜单区域 -->
  <div class="menu-container" id="menu-container">
    <!-- JS 会在这里生成菜单和文档内容 -->
  </div>

  <!-- 底部信息 -->
  <div class="footer-info">
    <div class="runtime" id="runtime"></div>
    <div class="footer">
      <p>Tips:该页面模仿了<a href="https://shenyouchu.cn" style="color:#FFB7C5;">沈幼楚的引导页</a>作为样式参考</p>
    </div>
  </div>
</div>

<script>
/* ===== 运行时长 ===== */
const START_TIME = new Date('2026-04-20T00:00:00Z').getTime();
function updateRuntime() {
  const diff = Date.now() - START_TIME;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('runtime').innerHTML =
    `本站已运行 <span>${d}</span> 天 <span>${h}</span> 时 <span>${m}</span> 分 <span>${s}</span> 秒`;
}
updateRuntime();
setInterval(updateRuntime, 1000);

/* ===== 加载数据并渲染 ===== */
fetch('./data.json')
  .then(res => res.json())
  .then(categories => {
    const menu = document.getElementById('menu-container');
    
    categories.forEach(cat => {
      
      // 情况1：大分类本身就是文档
      if (cat.file) {
        const wrapper = document.createElement('div');
        wrapper.className = 'menu-wrapper';
        
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.textContent = cat.category;
        item.onclick = () => toggleDoc(wrapper, cat.file, cat.category);
        
        const docArea = document.createElement('div');
        docArea.className = 'doc-content';
        docArea.id = `doc-${cat.category}`;
        
        wrapper.appendChild(item);
        wrapper.appendChild(docArea);
        menu.appendChild(wrapper);
        return;
      }

      // 情况2：大分类是分组
      const title = document.createElement('div');
      title.className = 'category-title';
      title.textContent = cat.category;
      menu.appendChild(title);

      // 子分类（文档）
      if (cat.subCategories) {
        cat.subCategories.forEach(sub => {
          const wrapper = document.createElement('div');
          wrapper.className = 'menu-wrapper';
          
          const item = document.createElement('div');
          item.className = 'menu-item';
          item.textContent = sub.subCategory;
          item.onclick = () => toggleDoc(wrapper, sub.file, sub.subCategory);
          
          const docArea = document.createElement('div');
          docArea.className = 'doc-content';
          docArea.id = `doc-${sub.subCategory}`;
          
          wrapper.appendChild(item);
          wrapper.appendChild(docArea);
          menu.appendChild(wrapper);
        });
      }

      // 项目链接卡片
      if (cat.items) {
        const wrap = document.createElement('div');
        wrap.className = 'links';
        cat.items.forEach(link => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = link.url;
          card.target = '_blank';
          card.innerHTML = `
            <img src="${link.icon}" alt="${link.title}">
            <div>
              <h3>${link.title}</h3>
              <p>${link.desc}</p>
            </div>
          `;
          wrap.appendChild(card);
        });
        menu.appendChild(wrap);
      }
    });
  });

/* ===== 切换文档显示 ===== */
function toggleDoc(wrapper, file, title) {
  const item = wrapper.querySelector('.menu-item');
  const docArea = wrapper.querySelector('.doc-content');
  
  // 如果已经打开，则关闭
  if (docArea.classList.contains('show')) {
    docArea.classList.remove('show');
    item.classList.remove('active');
    return;
  }
  
  // 关闭其他打开的文档
  document.querySelectorAll('.doc-content.show').forEach(el => {
    el.classList.remove('show');
    el.previousElementSibling.classList.remove('active');
  });
  
  // 打开当前文档
  item.classList.add('active');
  docArea.classList.add('show');
  
  // 加载内容
  loadDoc(docArea, file, title);
}

/* ===== 加载文档 ===== */
function loadDoc(container, file, title) {
  container.innerHTML = `<h2>${title}</h2><div class="doc-content-body">加载中...</div>`;
  
  fetch(file)
    .then(res => res.ok ? res.text() : Promise.reject('文件未找到'))
    .then(md => {
      container.innerHTML = `
        <h2>${title}</h2>
        <div class="doc-content-body">
          ${md.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}
        </div>
      `;
    })
    .catch(err => {
      container.innerHTML = `<h2>${title}</h2><div class="doc-content-body" style="color:#ff6b6b;">加载失败：${err}</div>`;
    });
}
</script>
</body>
</html>
