<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TouriCNの站点</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<!-- Marked.js (专业 Markdown 解析) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* ===== 基础 ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Ma Shan Zheng', cursive;
  color:#fff;
  min-height:100vh;
  background: #1a1a2e;
  overflow-x:hidden;
}
/* ===== 背景 ===== */
.bg {
  position:fixed; inset:0;
  background:url('https://site-file.shenyouchu.cn/pc.jpg') center/cover no-repeat;
  filter:brightness(.5);
  z-index:-1;
}
/* ===== 主体 ===== */
.main {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
/* ===== 头像 ===== */
.avatar-wrap { text-align:center; margin-bottom:30px; }
.avatar {
  width:120px; height:120px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-15px); }
}
/* ===== 头像下方文字 ===== */
.avatar-text { margin-top:15px; }
.avatar-text h1 { font-size:28px; margin-bottom:5px; }
.avatar-text p { font-size:14px; opacity:0.8; }

/* ===== 分类标题 ===== */
.category-title {
  font-size: 22px;
  margin-top: 25px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  color: #FFB7C5;
}
/* 子分类标题（小一号） */
.sub-category-title {
  font-size: 18px;
  margin-top: 20px;
  margin-bottom: 10px;
  color: rgba(255,255,255,0.9);
  padding-left: 10px;
  border-left: 3px solid #FFB7C5;
}

/* ===== 文档内容区域（核心） ===== */
.doc-content {
  margin-top: 15px;
  padding: 25px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  line-height: 1.9; /* 阅读舒适度 */
  font-size: 15px;
  color: rgba(255,255,255,0.85);
}
.doc-content h1, .doc-content h2, .doc-content h3 {
  color: #FFB7C5;
  margin: 20px 0 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.doc-content h1 { font-size: 24px; }
.doc-content h2 { font-size: 20px; }
.doc-content h3 { font-size: 18px; }

/* 代码块 */
.doc-content pre {
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
  overflow-x: auto;
  border: 1px solid rgba(255,255,255,0.1);
  margin: 15px 0;
}
.doc-content code {
  font-family: 'Consolas', monospace;
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: #FFB7C5;
}
/* 引用 */
.doc-content blockquote {
  border-left: 4px solid #FFB7C5;
  padding-left: 15px;
  margin: 15px 0;
  color: rgba(255,255,255,0.6);
}
/* 列表 */
.doc-content ul, .doc-content ol {
  padding-left: 20px;
}
/* 表格 */
.doc-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 15px 0;
}
.doc-content th, .doc-content td {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 12px;
}
.doc-content th {
  background: rgba(255,183,197,0.1);
}

/* ===== 链接卡片 ===== */
.links {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:15px;
  margin-top: 15px;
}
.card {
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  text-decoration:none;
  color:#fff;
  border:1px solid rgba(255,255,255,.15);
  transition:.3s;
}
.card:hover {
  transform:scale(1.05);
  background:rgba(255,255,255,.2);
}
.card img {
  width:48px; height:48px;
  border-radius:50%;
  margin-right:15px;
}
.card h3 { font-size:18px; margin-bottom:4px; }
.card p { font-size:14px; opacity:.8; }

/* ===== 底部信息 ===== */
.footer-info {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.runtime {
  text-align:center;
  font-size:14px;
}
.runtime span {
  color:#FFB7C5;
  font-weight:bold;
}
.footer {
  text-align:center;
  font-size:14px;
  opacity:.8;
  line-height:1.8;
  margin-top:15px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <!-- 1. 头像 -->
  <div class="avatar-wrap">
    <img class="avatar" src="/favicon.png">
    <div class="avatar-text">
      <h1>TouriCNの站点</h1>
      <p>分享一些有趣的东西</p>
    </div>
  </div>

  <!-- 2. 分类与内容区域 -->
  <div class="menu-container" id="menu-container">
    <!-- JS 会在这里直接生成分类和内容 -->
  </div>

  <!-- 3. 底部信息 -->
  <div class="footer-info">
    <div class="runtime" id="runtime"></div>
    <div class="footer">
      <p>Tips:该页面模仿了<a href="https://shenyouchu.cn" style="color:#FFB7C5;">沈幼楚的引导页</a>作为样式参考</p>
    </div>
  </div>
</div>

<script>
/* ===== 运行时长 ===== */
const START_TIME = new Date('2026-04-20T12:02:00Z').getTime();
function updateRuntime() {
  const diff = Date.now() - START_TIME;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('runtime').innerHTML =
    `本站已运行 <span>${d}</span> 天 <span>${h}</span> 时 <span>${m}</span> 分 <span>${s}</span> 秒`;
}
updateRuntime();
setInterval(updateRuntime, 1000);

/* ===== 加载数据并渲染 ===== */
fetch('./data.json')
  .then(res => res.json())
  .then(categories => {
    const container = document.getElementById('menu-container');
    
    categories.forEach(cat => {
      
      // 情况1：大分类本身就是文档（直接显示，不折叠）
      if (cat.file) {
        const section = document.createElement('div');
        section.className = 'category-section';
        
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = cat.category;
        
        const docArea = document.createElement('div');
        docArea.className = 'doc-content';
        docArea.id = `doc-${cat.category}`;
        
        section.appendChild(title);
        section.appendChild(docArea);
        container.appendChild(section);
        
        // 直接加载文档
        loadDoc(docArea, cat.file);
        return;
      }

      // 情况2：大分类是分组
      const title = document.createElement('div');
      title.className = 'category-title';
      title.textContent = cat.category;
      container.appendChild(title);

      // 子分类（文档）
      if (cat.subCategories) {
        cat.subCategories.forEach(sub => {
          const section = document.createElement('div');
          section.className = 'sub-category-section';
          
          const subTitle = document.createElement('div');
          subTitle.className = 'sub-category-title';
          subTitle.textContent = sub.subCategory;
          
          const docArea = document.createElement('div');
          docArea.className = 'doc-content';
          docArea.id = `doc-${sub.subCategory}`;
          
          section.appendChild(subTitle);
          section.appendChild(docArea);
          container.appendChild(section);
          
          // 直接加载文档
          loadDoc(docArea, sub.file);
        });
      }

      // 项目链接卡片
      if (cat.items) {
        const wrap = document.createElement('div');
        wrap.className = 'links';
        cat.items.forEach(link => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = link.url;
          card.target = '_blank';
          card.innerHTML = `
            <img src="${link.icon}" alt="${link.title}">
            <div>
              <h3>${link.title}</h3>
              <p>${link.desc}</p>
            </div>
          `;
          wrap.appendChild(card);
        });
        container.appendChild(wrap);
      }
    });
  });

/* ===== 加载文档（使用 marked.js 完美适配） ===== */
function loadDoc(container, file) {
  container.innerHTML = `<p>加载中...</p>`;
  
  fetch(file)
    .then(res => res.ok ? res.text() : Promise.reject('文件未找到'))
    .then(markdown => {
      // 使用 marked 解析 Markdown 为 HTML
      container.innerHTML = marked.parse(markdown);
    })
    .catch(err => {
      container.innerHTML = `<p style="color:#ff6b6b;">加载失败：${err}</p>`;
    });
}
</script>
</body>
</html>
